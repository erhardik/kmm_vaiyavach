{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h1 class="h3 mb-1">Order Details</h1>
    <p class="text-body-secondary mb-0">Order No. {{ header.order_number|default:"-" }}</p>
  </div>
  <div class="d-flex gap-2">
    {% if public_pdf_url %}
      <button type="button" class="btn btn-outline-secondary" data-copy-text="{{ public_pdf_url }}">Copy PDF Link</button>
      <a class="btn btn-outline-primary" href="{% if public_pdf_en_url %}{{ public_pdf_en_url }}{% else %}{{ public_pdf_url }}?pdf=full{% endif %}" target="_blank" rel="noopener">Full PDF</a>
      {% if public_pdf_gu_url %}
        <a class="btn btn-warning" href="{{ public_pdf_gu_url }}" target="_blank" rel="noopener">ગુજરાતી PDF</a>
      {% endif %}
    {% endif %}
    <a class="btn btn-outline-secondary" href="{% url 'requirements:header-list' %}">Back</a>
  </div>
</div>
{% include "requirements/header_detail.html" %}
{% endblock %}

{% extends "base.html" %}
{% block title %}Login | KMM ERP{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <div class="text-center mb-3">
          <img src="/static/images/kmm.png" alt="KMM" class="login-logo mb-3">
          <h1 class="h4 mb-1">KMM Chaturmas ERP</h1>
          <p class="text-body-secondary mb-0">Sign in to continue</p>
        </div>
        <form method="post">
          {% csrf_token %}
          {{ form.non_field_errors }}
          <div class="mb-3">
            <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
            {{ form.username }}
          </div>
          <div class="mb-3">
            <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
            {{ form.password }}
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
